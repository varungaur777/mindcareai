<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>MindCare AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
<nav class="bg-slate-900/80 border-b border-slate-800 backdrop-blur sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="{{ url_for('home') }}" class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-teal-400 to-indigo-500"></div>
            <span class="font-semibold text-lg tracking-wide">MindCare AI</span>
        </a>
        <div class="flex gap-4 text-sm">
            <a href="{{ url_for('mood') }}" class="nav-link">Mood Test</a>
            <a href="{{ url_for('chat') }}" class="nav-link">Chatbot</a>
            <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('journal') }}" class="nav-link">Journal</a>
            <a href="{{ url_for('meditation') }}" class="nav-link">Meditation</a>
            <a href="{{ url_for('profile') }}" class="nav-link">Profile</a>
            <a href="{{ url_for('about') }}" class="nav-link">About</a>
        </div>
    </div>
</nav>

<main class="flex-1">
    {% block content %}{% endblock %}
</main>

<footer class="bg-slate-900 border-t border-slate-800 mt-8">
    <div class="max-w-6xl mx-auto px-4 py-4 text-xs text-slate-400 flex flex-col sm:flex-row justify-between gap-2">
        <span>MindCare AI — A Mental Wellness Companion</span>
        <span>Developed by: <strong class="text-slate-200">Isha Gaur</strong> | Roll No: 231053 | Global Institute of Technology and Management | B.Tech CSE</span>
    </div>
</footer>
</body>
</html>
