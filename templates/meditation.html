{% extends "base.html" %}
{% block content %}
<section class="max-w-4xl mx-auto px-4 py-10">
    <h2 class="text-2xl font-semibold mb-2">Meditation & Calming Practices</h2>
    <p class="text-slate-300 text-sm mb-4">
        Explore simple practices that can support relaxation, grounding, and emotional balance.
    </p>

    <div class="grid md:grid-cols-2 gap-4">
        {% for s in suggestions %}
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
                <h3 class="text-sm font-semibold mb-1">{{ s.title }}</h3>
                <p class="text-xs text-slate-300 mb-2">{{ s.description }}</p>
                <a href="{{ s.link }}" target="_blank" class="text-xs text-teal-300 hover:text-teal-200 underline">
                    Open resource
                </a>
            </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
